<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification (KYC) - HelpOn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .kyc-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }
        .doc-preview {
            max-width: 100%;
            height: 200px;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .doc-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home.html">
                <i class="bi bi-heart-pulse-fill me-2"></i>HelpOn
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Header -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Identity Verification</h2>
                    <p class="text-muted">Verify your identity to build trust and unlock premium features</p>
                </div>

                <!-- Status Card -->
                <div id="statusContainer" class="card kyc-card mb-4 d-none">
                    <div class="card-body text-center p-4">
                        <h5 class="mb-3">Current Status</h5>
                        <span id="kycStatusBadge" class="status-badge">Unknown</span>
                        <div id="statusFeedback" class="mt-3 text-muted small"></div>
                    </div>
                </div>

                <!-- Submission Form -->
                <div id="submissionContainer" class="card kyc-card">
                    <div class="card-body p-4 p-sm-5">
                        <form id="kycForm">
                            <div class="mb-3">
                                <label class="form-label">Document Type</label>
                                <select class="form-select form-select-lg" id="docType" required>
                                    <option value="" selected disabled>Select a document</option>
                                    <option value="Aadhar">Aadhar Card</option>
                                    <option value="PAN">PAN Card</option>
                                    <option value="Driver License">Driver's License</option>
                                    <option value="Passport">Passport</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Document Number</label>
                                <input type="text" class="form-control form-control-lg" id="docNumber" required placeholder="Enter ID number">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Upload Document Image</label>
                                <div class="doc-preview" id="previewContainer">
                                    <div class="text-center text-muted" id="previewPlaceholder">
                                        <i class="bi bi-cloud-arrow-up fs-1"></i>
                                        <p class="mb-0">Click to upload or drag image</p>
                                    </div>
                                    <img id="imagePreview" src="" alt="Preview" class="d-none">
                                </div>
                                <input type="file" id="docFile" class="d-none" accept="image/*">
                                <button type="button" class="btn btn-outline-secondary w-100" onclick="document.getElementById('docFile').click()">
                                    Select File
                                </button>
                            </div>

                            <div class="alert alert-info small mb-4">
                                <i class="bi bi-shield-lock-fill me-2"></i>
                                Your data is encrypted and used only for verification purposes.
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                                <span class="spinner-border spinner-border-sm d-none" id="submitSpinner"></span>
                                <span id="submitText">Submit for Verification</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isUserLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const kycForm = document.getElementById('kycForm');
            const docFile = document.getElementById('docFile');
            const imagePreview = document.getElementById('imagePreview');
            const previewPlaceholder = document.getElementById('previewPlaceholder');
            const submitBtn = document.getElementById('submitBtn');
            const submitSpinner = document.getElementById('submitSpinner');
            const submitText = document.getElementById('submitText');

            // Load current status
            await loadKYCStatus();

            // File selection preview
            docFile.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imagePreview.src = e.target.result;
                        imagePreview.classList.remove('d-none');
                        previewPlaceholder.classList.add('d-none');
                    }
                    reader.readAsDataURL(file);
                }
            });

            // Form submission
            kycForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const file = docFile.files[0];
                if (!file) {
                    showToast('Please select a document image', 'warning');
                    return;
                }

                submitBtn.disabled = true;
                submitSpinner.classList.remove('d-none');
                submitText.textContent = 'Uploading...';

                try {
                    // 1. Upload to Cloudinary (Simulated for this implementation, using a mock endpoint)
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    // In a real app, you'd upload the file first then send the URL
                    // Here we'll simulate the upload result
                    const mockImageUrl = "https://res.cloudinary.com/dummy/image/upload/v1/kyc/" + file.name;

                    // 2. Submit KYC data
                    const { data: { user } } = await supabase.auth.getUser();
                    if (!user) return;

                    // 2. Submit KYC data to Supabase
                    const { error: dbError } = await supabase
                        .from('kyc_submissions')
                        .insert([{
                            user_id: user.id,
                            document_type: document.getElementById('docType').value,
                            document_number: document.getElementById('docNumber').value,
                            document_image_url: mockImageUrl,
                            status: 'pending'
                        }]);

                    if (!dbError) {
                        // Also update profile status
                        await supabase
                            .from('profiles')
                            .update({ kyc_status: 'pending' })
                            .eq('id', user.id);

                        showToast('KYC submitted successfully!', 'success');
                        await loadKYCStatus();
                    } else {
                        showToast(dbError.message || 'Failed to submit KYC', 'error');
                    }
                } catch (error) {
                    showToast('An error occurred during submission', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitSpinner.classList.add('d-none');
                    submitText.textContent = 'Submit for Verification';
                }
            });

            async function loadKYCStatus() {
                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    if (!user) return;

                    const { data, error } = await supabase
                        .from('kyc_submissions')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .single();

                    if (!error && data) {
                        displayStatus(data);
                    }
                } catch (error) {
                    console.log('No KYC background found or error loading status');
                }
            }

            function displayStatus(data) {
                const statusContainer = document.getElementById('statusContainer');
                const submissionContainer = document.getElementById('submissionContainer');
                const badge = document.getElementById('kycStatusBadge');
                const feedback = document.getElementById('statusFeedback');

                statusContainer.classList.remove('d-none');
                
                badge.textContent = data.status.toUpperCase();
                
                if (data.status === 'pending') {
                    badge.className = 'status-badge bg-warning text-dark';
                    feedback.textContent = 'Our team is reviewing your documents. This usually takes 24-48 hours.';
                    submissionContainer.classList.add('d-none');
                } else if (data.status === 'approved') {
                    badge.className = 'status-badge bg-success text-white';
                    feedback.textContent = 'Your identity is verified! You now have a verified badge.';
                    submissionContainer.classList.add('d-none');
                } else if (data.status === 'rejected') {
                    badge.className = 'status-badge bg-danger text-white';
                    feedback.textContent = 'Verification rejected. Feedback: ' + (data.admin_feedback || 'Please try again with clearer documents.');
                    submissionContainer.classList.remove('d-none');
                }
            }
        });
    </script>
</body>
</html>
