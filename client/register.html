<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>Register - HelpOn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 20px;
        }

        .btn-primary {
            background-color: #2563eb;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .logo-text {
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .alert {
            border-radius: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js?v=3.1"></script>
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-body p-4 p-sm-5">
                        <div class="text-center mb-4">
                            <h2 class="logo-text">Join HelpOn</h2>
                            <p class="text-muted">Save and Be Saved</p>
                        </div>

                        <div id="registerAlert" class="alert alert-danger d-none" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span id="alertMessage"></span>
                        </div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" required placeholder="Enter your full name">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required placeholder="Enter your email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required placeholder="Min 6 characters">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" required placeholder="Confirm your password">
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary" id="registerBtn">
                                    <span class="spinner-border spinner-border-sm d-none" id="registerSpinner"></span>
                                    <span id="registerText">Create Account</span>
                                </button>
                            </div>

                            <div class="d-flex align-items-center my-4">
                                <hr class="flex-grow-1">
                                <span class="px-2 text-muted">OR</span>
                                <hr class="flex-grow-1">
                            </div>

                            <div class="d-grid gap-2 mb-3">
                                <button type="button" class="btn btn-outline-danger" id="googleLoginBtn">
                                    <i class="bi bi-google me-2"></i> Continue with Google
                                </button>
                            </div>

                            <div class="text-center">
                                <p class="text-muted">Already have an account? <a href="index.html" class="text-decoration-none">Login</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Email Confirmation Modal -->
    <div class="modal fade" id="emailConfirmModal" tabindex="-1" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-body text-center p-5">
                    <h4 class="fw-bold mb-3">Check Your Inbox!</h4>
                    <p class="text-muted">A verification link has been sent to your email. Confirm it to log in.</p>
                    <button type="button" class="btn btn-primary rounded-pill mt-3" onclick="window.location.href='index.html'">Go to Login</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getSupabase } from './js/auth.js?v=3.1';

        document.addEventListener('DOMContentLoaded', function () {
            const registerForm = document.getElementById('registerForm');
            const fullNameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const registerBtn = document.getElementById('registerBtn');
            const registerSpinner = document.getElementById('registerSpinner');
            const registerText = document.getElementById('registerText');
            const registerAlert = document.getElementById('registerAlert');
            const alertMessage = document.getElementById('alertMessage');

            registerForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                registerAlert.classList.add('d-none');

                if (passwordInput.value !== confirmPasswordInput.value) {
                    registerAlert.classList.remove('d-none');
                    alertMessage.textContent = 'Passwords do not match';
                    return;
                }

                registerBtn.disabled = true;
                registerSpinner.classList.remove('d-none');
                registerText.textContent = 'Creating...';

                try {
                    const client = getSupabase();
                    if (!client) throw new Error("Supabase initialization failed");

                    const { data, error } = await client.auth.signUp({
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                        options: { data: { full_name: fullNameInput.value.trim() } }
                    });

                    if (error) throw error;

                    const confirmModal = new bootstrap.Modal(document.getElementById('emailConfirmModal'));
                    confirmModal.show();
                } catch (error) {
                    registerAlert.classList.remove('d-none');
                    alertMessage.textContent = error.message;
                    registerBtn.disabled = false;
                    registerSpinner.classList.add('d-none');
                    registerText.textContent = 'Create Account';
                }
            });

            const googleBtn = document.getElementById('googleLoginBtn');
            if (googleBtn) {
                googleBtn.addEventListener('click', async function () {
                    const client = getSupabase();
                    if (!client || !client.auth) {
                        alert("Supabase service not ready. Refreshing...");
                        window.location.reload();
                        return;
                    }

                    try {
                        // Dynamically build redirect URL from current browser address
                        const currentUrl = new URL(window.location.href);
                        const redirectTo = currentUrl.origin + '/home.html';
                        console.log('[HelpOn] Redirect URL:', redirectTo);

                        const { error } = await client.auth.signInWithOAuth({
                            provider: 'google',
                            options: { redirectTo: redirectTo }
                        });
                        if (error) throw error;
                    } catch (error) {
                        registerAlert.classList.remove('d-none');
                        alertMessage.textContent = "Google Error: " + error.message;
                    }
                });
            }
        });
    </script>
</body>
</html>
