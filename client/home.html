<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>HelpOn - Emergency Support</title>
    <!-- Bootstrap 5 CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        /* Wave animation for greeting */
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .animate-wave {
            display: inline-block;
            transform-origin: bottom center;
            animation: wave 1s ease-in-out infinite;
        }

        /* Custom SOS button shadow */
        .btn-sos {
            box-shadow: 0 4px 25px rgba(220, 53, 69, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-sos:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(220, 53, 69, 0.7);
        }

        .sos-active {
            animation: pulse 1.5s infinite;
        }

        .sos-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sos-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dc2626;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .map-placeholder {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .toast-container {
            z-index: 1055;
        }

        /* Dark Mode Styles */
        .dark-mode { background-color: #121212 !important; color: #ffffff !important; }
        .dark-mode .bg-light { background-color: #1e1e1e !important; color: #ffffff !important; }
        .dark-mode .bg-white { background-color: #2d2d2d !important; color: #ffffff !important; }
        .dark-mode .card { background-color: #2d2d2d !important; color: #ffffff !important; border-color: #444 !important; }
        .dark-mode .text-muted { color: #aaa !important; }
        .dark-mode .form-control, .dark-mode .form-select { background-color: #2d2d2d; border-color: #444; color: #ffffff; }
        .dark-mode .modal-content { background-color: #2d2d2d; color: #ffffff; }
        .dark-mode .list-group-item { background-color: #2d2d2d; color: #ffffff; border-color: #444; }
        .dark-mode .navbar { background-color: #2d2d2d !important; border-color: #444 !important; }

        /* Emergency Feature Colors */
        .theme-peach { background-color: #ffdab9 !important; color: #8a4b08 !important; }
        .theme-lime { background-color: #32cd32 !important; color: white !important; border-color: #2eb82e !important; }
        .theme-sky-blue { border: 3px solid #87ceeb !important; box-shadow: 0 0 15px rgba(135, 206, 235, 0.5) !important; border-radius: 12px; }
        .border-peach { border-left: 4px solid #ffba75 !important; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js?v=3.0"></script>
</head>

<body class="bg-light" style="padding-bottom: 72px;">
    <!-- Top Header -->
    <header class="bg-white shadow-sm sticky-top">
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div style="width: 32px; height: 32px; background: #0d6efd; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-right: 8px;">H</div>
                    <span class="fw-bold text-primary">HelpOn</span>
                </div>
                <button class="btn btn-outline-danger btn-sm logout-trigger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="container py-3">
        <!-- User Greeting -->
        <section class="mb-4">
            <h1 class="fw-bold" id="userGreetingHeader">Hi <span id="userName">User</span><span class="animate-wave">👋</span></h1>
            <div class="d-flex gap-2 mb-2">
                <span class="badge bg-primary rounded-pill">Helper & Seeker</span>
                <span class="badge bg-warning text-dark rounded-pill">Guardian <i class="bi bi-shield"></i></span>
            </div>
            <p class="text-muted mb-0">Welcome back! Let's get you connected.</p>
        </section>

        <!-- SOS Button Section -->
        <section class="mb-4 text-center">
            <button class="btn btn-danger btn-lg rounded-pill py-3 px-4 btn-sos fw-bold shadow" id="sosBtn" style="width: min(80%, 300px); font-size: 1.1rem; letter-spacing: 0.04em;">
                <i class="bi bi-bell-fill me-2"></i>SOS EMERGENCY
            </button>
            <div class="mt-2">
                <div class="sos-indicator d-none shadow-sm" id="sosActiveIndicator">
                    <span class="dot"></span> <span class="fw-bold" style="color: #d32f2f;">SOS ACTIVE</span>
                </div>
            </div>
            <div class="d-flex justify-content-center mt-3 gap-2">
                <select class="form-select form-select-sm w-auto" id="emergencyType">
                    <option value="danger">Danger</option>
                    <option value="health">Health</option>
                    <option value="lost">Lost</option>
                    <option value="custom">Custom</option>
                </select>
                <button class="btn btn-light border btn-sm" id="sosMedical" title="Medical SOS"><i class="bi bi-heart-pulse text-danger"></i></button>
                <button class="btn btn-light border btn-sm" id="sosDanger" title="Safety SOS"><i class="bi bi-shield-lock text-warning"></i></button>
            </div>
        </section>

        <!-- Map Section -->
        <section class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0 fw-semibold">Live Map</h5>
                    <a href="map.html" class="btn btn-outline-primary btn-sm">View Full</a>
                </div>
                <div class="rounded-3 theme-sky-blue position-relative overflow-hidden" id="mapContainer" style="height: 300px; z-index: 1; background-color: #e0f7fa;"></div>
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <small class="text-nowrap"><i class="bi bi-person-fill text-primary"></i> You</small>
                    <small class="text-nowrap"><i class="bi bi-people-fill text-success"></i> <span id="helpersCount">0</span> Helpers Nearby</small>
                </div>
            </div>
        </section>

        <!-- Help Requests Nearby -->
        <section class="mb-4">
            <h5 class="fw-semibold mb-3">Help Requests Nearby</h5>
            <div class="row g-3" id="helpRequestsContainer">
                <div class="col-12"><p class="text-center py-4">Searching for requests...</p></div>
            </div>
        </section>

        <!-- Rewards Section -->
        <section class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
                <h5 class="card-title fw-semibold mb-3">Your Rewards</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span><i class="bi bi-coin text-warning"></i> <span id="pointsCount">0</span> Points</span>
                    <span>Rank: <span id="userRank">—</span></span>
                </div>
                <div class="progress mb-1" style="height: 8px;">
                    <div class="progress-bar bg-warning" id="progressBar" style="width: 0%"></div>
                </div>
                <small class="text-muted" id="pointsHint">Start helping to earn points</small>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="navbar fixed-bottom bg-white shadow-sm border-top py-2">
        <div class="container">
            <div class="d-flex justify-content-around w-100">
                <a href="home.html" class="text-center text-primary d-flex flex-column align-items-center">
                    <i class="bi bi-house-door-fill fs-5"></i>
                    <span class="small">Home</span>
                </a>
                <a href="map.html" class="text-center text-muted d-flex flex-column align-items-center">
                    <i class="bi bi-map fs-5"></i>
                    <span class="small">Map</span>
                </a>
                <a href="rewards.html" class="text-center text-muted d-flex flex-column align-items-center">
                    <i class="bi bi-gift fs-5"></i>
                    <span class="small">Rewards</span>
                </a>
                <a href="profile.html" class="text-center text-muted d-flex flex-column align-items-center">
                    <i class="bi bi-person-fill fs-5"></i>
                    <span class="small">Profile</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- HELPON MODULES -->
    <script type="module">
        import { supabase, getCurrentUser, logout, isUserLoggedIn } from './js/auth.js?v=3.0';
        import { createEmergency } from './js/sos.js?v=3.0';
        import { 
            DEFAULT_LOCATION, 
            saveLocation, 
            loadSavedLocation, 
            isLocationFresh,
            getDistanceKm
        } from './js/utils.js?v=3.0';
        import { initTelemetry } from './js/error_telemetry.js?v=3.0';

        // Initialize Telemetry
        initTelemetry();

        let homeMap = null;
        let homeUserMarker = null;
        let userLat = DEFAULT_LOCATION.lat;
        let userLon = DEFAULT_LOCATION.lon;

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[HelpOn] Home Loaded. Checking session...');
            
            // Give Supabase a tiny bit of time to process Hash tokens if present
            if (window.location.hash) {
                console.log('[HelpOn] Hash detected, waiting for session processing...');
                await new Promise(r => setTimeout(r, 100));
            }

            if (!isUserLoggedIn()) {
                console.warn('[HelpOn] Not logged in, redirecting to index.html');
                window.location.href = 'index.html';
                return;
            }

            const user = await getCurrentUser();
            if (user) {
                const name = localStorage.getItem('helpon_user_name') || 'HelpOn User';
                const el = document.getElementById('userName');
                if (el) el.textContent = name;
                
                const firstName = name.split(' ')[0];
                const greeting = document.getElementById('userGreetingHeader');
                if (greeting) greeting.innerHTML = `Hi ${firstName}<span class="animate-wave">👋</span>`;
            }

            // Sync rewards from DB
            syncRewards(user);

            initUI();
            initLocation();
            initRealtime();
        });

        async function syncRewards(user) {
            if (!user) return;
            const { data } = await supabase.from('profiles').select('points').eq('id', user.id).single();
            if (data) {
                const points = data.points || 0;
                document.getElementById('pointsCount').textContent = points;
                document.getElementById('progressBar').style.width = `${Math.min((points/500)*100, 100)}%`;
                document.getElementById('pointsHint').textContent = points >= 500 ? 'Reward Unlocked!' : `Next reward at 500 (${500-points} to go)`;
            }
        }

        function initUI() {
            document.querySelectorAll('.logout-trigger').forEach(el => {
                el.onclick = () => { if(confirm('Logout?')) logout(); };
            });

            // SOS Handlers
            document.getElementById('sosBtn').onclick = () => triggerSOS('General Emergency');
            document.getElementById('sosMedical').onclick = () => triggerSOS('Medical Emergency');
            document.getElementById('sosDanger').onclick = () => triggerSOS('Safety Threat');
        }

        async function triggerSOS(type) {
            showToast(`Broadcasting ${type}...`, 'warning');
            const { error } = await createEmergency(type, 'Requesting help from nearby users', userLat, userLon);
            if (!error) {
                showToast('SOS Sent Successfully!', 'success');
                setTimeout(() => window.location.href = 'map.html', 1500);
            } else {
                showToast(error.message, 'danger');
            }
        }

        function initLocation() {
            const saved = loadSavedLocation();
            userLat = saved ? saved.lat : DEFAULT_LOCATION.lat;
            userLon = saved ? saved.lon : DEFAULT_LOCATION.lon;
            
            setupHomeMap(userLat, userLon);

            if (navigator.geolocation && (!saved || !isLocationFresh(saved))) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    userLat = lat; userLon = lon;
                    saveLocation(lat, lon);
                    updateMap(lat, lon);
                    syncLocationToDB(lat, lon);
                }, err => console.warn("Geo error", err), {timeout: 10000});
            }

            setInterval(() => syncLocationToDB(userLat, userLon), 60000);
        }

        async function syncLocationToDB(lat, lon) {
            const user = await getCurrentUser();
            if (user) {
                await supabase.from('profiles').update({
                    latitude: lat,
                    longitude: lon,
                    last_active: new Date().toISOString()
                }).eq('id', user.id);
            }
        }

        function setupHomeMap(lat, lon) {
            if (homeMap) return;
            homeMap = L.map('mapContainer', { zoomControl: false, attributionControl: false }).setView([lat, lon], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(homeMap);
            
            const icon = L.divIcon({
                html: `<div style="background:#0d6efd; width:14px; height:14px; border-radius:50%; border:3px solid white; box-shadow: 0 0 8px rgba(13,110,253,0.5);"></div>`,
                className: '', iconSize: [14, 14]
            });
            homeUserMarker = L.marker([lat, lon], { icon }).addTo(homeMap);
        }

        function updateMap(lat, lon) {
            if (homeMap) {
                homeMap.setView([lat, lon], 14);
                if (homeUserMarker) homeUserMarker.setLatLng([lat, lon]);
            }
        }

        function initRealtime() {
            // Helpers count realtime
            supabase.channel('public:profiles')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, refreshNearbyCount)
                .subscribe();
            
            // Emergencies realtime
            supabase.channel('public:emergencies')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'emergencies' }, refreshRequests)
                .subscribe();

            refreshNearbyCount();
            refreshRequests();
        }

        async function refreshNearbyCount() {
            const activeSince = new Date(Date.now() - 10 * 60000).toISOString();
            const { data: users } = await supabase.from('profiles').select('id, latitude, longitude').gt('last_active', activeSince);
            if (users) {
                const count = users.filter(u => getDistanceKm(userLat, userLon, u.latitude, u.longitude) <= 5).length;
                const el = document.getElementById('helpersCount');
                if (el) el.textContent = Math.max(0, count - 1);
            }
        }

        async function refreshRequests() {
            const { data } = await supabase.from('emergencies').select('*, profiles(full_name)').eq('status', 'active');
            const container = document.getElementById('helpRequestsContainer');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="card border-0 shadow-sm text-center py-4 text-muted"><i class="bi bi-check-circle fs-1 text-success mb-2"></i><p class="mb-0">All quiet nearby</p></div></div>';
                return;
            }

            container.innerHTML = data.map(req => {
                const dist = getDistanceKm(userLat, userLon, req.latitude, req.longitude).toFixed(1);
                return `<div class="col-12">
                    <div class="card border-0 shadow-sm border-peach" style="background:#fff9f2">
                        <div class="card-body d-flex justify-content-between align-items-center py-3">
                            <div>
                                <span class="badge bg-danger rounded-pill mb-1">${req.type}</span>
                                <h6 class="mb-1">${req.profiles?.full_name || 'Someone'} needs help</h6>
                                <small class="text-muted"><i class="bi bi-geo-alt"></i> ${dist} km away</small>
                            </div>
                            <button class="btn theme-lime btn-sm px-3 fw-bold shadow-sm" onclick="window.location.href='map.html?emergency=${req.id}'">Help</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function showToast(m, t = 'info') {
            const id = 't-' + Date.now();
            const container = document.querySelector('.toast-container');
            if (!container) return;
            container.insertAdjacentHTML('beforeend', `<div id="${id}" class="toast align-items-center text-bg-${t} border-0" role="alert"><div class="d-flex"><div class="toast-body">${m}</div></div></div>`);
            const node = document.getElementById(id);
            (new bootstrap.Toast(node, { delay: 3000 })).show();
            node.addEventListener('hidden.bs.toast', () => node.remove());
        }
    </script>
</body>
</html>
